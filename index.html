으로 만들 수 있으면, 한화 각 계열사(보험·증권·자산운용)가 IT 대형 프로젝트 없이 업무 에이전트를 빠르게 시제품화 가능 → <strong>사업개발 속도</strong> 관점에서 큰 레버리지.</li>\n<li><strong>거버넌스 내장 = 규제업 적합:</strong> Intent Guard·Tool Approval 같은 정책이 런타임 기본값이라, 금융·보험처럼 <em>승인/감사/통제</em>가 필수인 영역에 바로 얹기 좋음 (cf. [[uipath-maestro-case-agentic]]의 human-in-the-loop 논리와 연결).</li>\n<li><strong>오픈웨이트 + Sovereign Core(주권 실행):</strong> 외부 클라우드/모델에 데이터 안 넘기고 <em>자체 실행</em> 가능 → 금융 데이터 보안·국내 규제 대응에 유리. 비용(작은 모델로 1위)도 <strong>재무 관점</strong>에서 매력.</li>\n<li><strong>재무/세무 자동화 PoC 후보:</strong> 36종 도구 중 &#x27;금융 데이터&#x27; 포함 → 공시·재무데이터 수집·분석 에이전트, 세무 리서치 에이전트 등 네 관심사 직결 영역에 바로 실험해볼 만함.</li>\n</ul>\n<h2>4. 추가 리서치 / 사례</h2>\n<ul>\n<li><strong>[외부]</strong> &#x27;harness&#x27;는 SW의 <em>test harness</em>(코드를 실행·검증하게 감싸는 골격)에서 온 말. AI에선 LLM(엔진)을 실제로 일하게 만드는 <em>실행 계층</em>(섀시·배선·핸들)을 뜻함. 최근 &#x27;agent harness / model harness&#x27;로 통용.</li>\n<li><strong>[외부]</strong> 경쟁/비교 축: LangChain·LangGraph(프레임워크), AutoGen·CrewAI(멀티에이전트), OpenAI Agents SDK. CUGA의 차별점은 &quot;프레임워크가 아닌 하네스 + 거버넌스 런타임 내장 + 벤치 SOTA&quot;.</li>\n</ul>\n<h2>5. Q&amp;A / 메모</h2>\n<p><strong>Q:</strong> 하네스(harness)가 뭐야?</p>\n<p><strong>A:</strong> LLM을 실제로 &#x27;일하게&#x27; 감싸는 <strong>주변 인프라/골격(실행 계층)</strong>. LLM 자체는 토큰 예측기라 혼자서는 도구 호출·다단계 계획·실패 복구를 못 함. 그걸 둘러싸 굴러가게 만드는 게 하네스.</p>\n<ul>\n<li>담당: 계획(planning) + 실행 루프 + 도구 호출 배선 + 상태 관리 + 에러처리/자기수정(reflection) + 출력포맷/정책.</li>\n<li>비유: <strong>LLM = 엔진, 하네스 = 섀시·배선·핸들·계기판</strong> (엔진만으론 못 달림).</li>\n<li>어원: SW의 test harness, 원뜻은 말 &#x27;마구(馬具)&#x27; — 강한 동물을 <em>제어해 일 시키는 장치</em>.</li>\n<li>&quot;프레임워크 아니고 하네스&quot; = 프레임워크는 코드 구조를 강제 vs 하네스는 에이전트 정의 그대로 두고 실행/배포만 교체. → 좋은 하네스면 <em>작은 모델로도</em> 벤치 1위(글의 핵심 주장).</li>\n</ul>\n<hr>\n<p>_다시 볼 것 / 미해결:_</p>\n<ul>\n<li>cuga-apps 24개 예제 중 금융/재무 관련 예제 실제로 돌려보기 (<code>pip install cuga</code>).</li>\n<li>CUGA &#x27;Sovereign Core&#x27; 라이선스·온프레 운영 요건 확인.</li>\n</ul>", "search": "ibm cuga — 에이전트 '하네스(harness)'와 cuga-apps 예제 24종 ai·llm #에이전트 #오픈소스 #사업개발 #거버넌스 # ibm cuga — 에이전트 '하네스(harness)'와 cuga-apps 예제 24종\n\n## 1. 핵심 요약\nibm research가 만든 오픈소스 **에이전트 하네스 cuga(configurable generalist agent)** 소개 글(2026-06-23). 기존 에이전트 앱 개발은 \"일주일치 배관 작업\"(모델 연결·도구 어댑터·상태관리 ui)이 필요했는데, cuga는 **계획·실행 루프·도구 호출·상태 배관을 전부 대신 처리**해서 개발자는 *도구 목록 + 프롬프트*만 쓰면 됨. 핵심 주장: **\"프레임워크가 아니라 하네스\"** → 에이전트 정의는 그대로 두고 배포 환경만 교체. cuga-apps는 작동하는 예제 24종 모음. `pip install cuga`.\n\n## 2. key takeaways\n- **하네스 vs 프레임워크:** 프레임워크는 *코드 짜는 구조를 강제*, 하네스는 *에이전트 정의는 그대로 두고 실행/배포만 갈아끼움*. 에이전트 앱을 **한 파일**로 유지 가능.\n- **성능(작은 모델 + 좋은 하네스):**\n  - **appworld** 벤치마크 1위 (2025.07~2026.02)\n  - **webarena** 1위 (2025.02~09)\n  - 오픈웨이트 **gpt-oss-120b**로 운영 → *\"모델 크기보다 하네스 설계\"*가 성능을 좌우한다는 메시지.\n- **거버넌스 기본 내장(런타임):** intent guard, tool approval, tool guide, playbook, output formatter — 사후 추가가 아니라 처음부터 런타임에 포함 → 프로덕션 갈 때 재작성 불필요.\n- **도구 호환:** openapi · mcp · langchain 함수. 호스팅 mcp 서버 7개(도구 36종: 웹검색·위키·지오코딩·금융데이터 등).\n- **통일된 상태 규약:** 모든 도구가 `{\"ok\": true, \"data\": ...}` / `{\"ok\": false, \"code\": ..., \"error\": ...}` 형식 → 에이전트가 실패를 선언적으로 처리.\n- **추론 모드 전환:** fast / balanced / accurate를 코드 변경 없이 스위치.\n- **멀티에이전트:** cugasupervisor가 전문가 에이전트에 위임.\n\n## 3. 💡 사업 아이디어 (한화 적용 관점)\n- **하네스 = 진입장벽 붕괴:** 사내 에이전트 앱을 \"한 파일 + 도구목록\"으로 만들 수 있으면, 한화 각 계열사(보험·증권·자산운용)가 it 대형 프로젝트 없이 업무 에이전트를 빠르게 시제품화 가능 → **사업개발 속도** 관점에서 큰 레버리지.\n- **거버넌스 내장 = 규제업 적합:** intent guard·tool approval 같은 정책이 런타임 기본값이라, 금융·보험처럼 *승인/감사/통제*가 필수인 영역에 바로 얹기 좋음 (cf. [[uipath-maestro-case-agentic]]의 human-in-the-loop 논리와 연결).\n- **오픈웨이트 + sovereign core(주권 실행):** 외부 클라우드/모델에 데이터 안 넘기고 *자체 실행* 가능 → 금융 데이터 보안·국내 규제 대응에 유리. 비용(작은 모델로 1위)도 **재무 관점**에서 매력.\n- **재무/세무 자동화 poc 후보:** 36종 도구 중 '금융 데이터' 포함 → 공시·재무데이터 수집·분석 에이전트, 세무 리서치 에이전트 등 네 관심사 직결 영역에 바로 실험해볼 만함.\n\n## 4. 추가 리서치 / 사례\n- **[외부]** 'harness'는 sw의 *test harness*(코드를 실행·검증하게 감싸는 골격)에서 온 말. ai에선 llm(엔진)을 실제로 일하게 만드는 *실행 계층*(섀시·배선·핸들)을 뜻함. 최근 'agent harness / model harness'로 통용.\n- **[외부]** 경쟁/비교 축: langchain·langgraph(프레임워크), autogen·crewai(멀티에이전트), openai agents sdk. cuga의 차별점은 \"프레임워크가 아닌 하네스 + 거버넌스 런타임 내장 + 벤치 sota\".\n\n## 5. q&a / 메모\n**q:** 하네스(harness)가 뭐야?\n**a:** llm을 실제로 '일하게' 감싸는 **주변 인프라/골격(실행 계층)**. llm 자체는 토큰 예측기라 혼자서는 도구 호출·다단계 계획·실패 복구를 못 함. 그걸 둘러싸 굴러가게 만드는 게 하네스.\n- 담당: 계획(planning) + 실행 루프 + 도구 호출 배선 + 상태 관리 + 에러처리/자기수정(reflection) + 출력포맷/정책.\n- 비유: **llm = 엔진, 하네스 = 섀시·배선·핸들·계기판** (엔진만으론 못 달림).\n- 어원: sw의 test harness, 원뜻은 말 '마구(馬具)' — 강한 동물을 *제어해 일 시키는 장치*.\n- \"프레임워크 아니고 하네스\" = 프레임워크는 코드 구조를 강제 vs 하네스는 에이전트 정의 그대로 두고 실행/배포만 교체. → 좋은 하네스면 *작은 모델로도* 벤치 1위(글의 핵심 주장).\n\n---\n_다시 볼 것 / 미해결:_\n- cuga-apps 24개 예제 중 금융/재무 관련 예제 실제로 돌려보기 (`pip install cuga`).\n- cuga 'sovereign core' 라이선스·온프레 운영 요건 확인.\n"}, {"file": "uipath-maestro-case-agentic.md", "title": "유아이패스 '마에스트로 케이스' — 에이전틱 케이스 관리", "date": "2026-06-26", "category": "AI·LLM", "source": "https://www.newstheai.com/news/articleView.html?idxno=20943", "type": "article", "tags": ["#사업개발", "#에이전트", "#금융", "#자동화"], "html": "<h1>유아이패스 &#x27;마에스트로 케이스&#x27; — 에이전틱 케이스 관리</h1>\n<h2>1. 핵심 요약</h2>\n<p>유아이패스(UiPath)가 AI 네이티브로 설계한 에이전틱 케이스 관리 기능 <strong>&#x27;마에스트로 케이스(Maestro Case)&#x27;</strong>를 발표(2026-06-23). 기존 정형 RPA로는 처리하기 어려운 <strong>동적이고 예외가 많은 업무</strong>를, AI 에이전트가 사람·시스템과 함께 하나의 워크플로우로 오케스트레이션해 처리하는 것이 핵심. RPA에서 → &#x27;에이전트가 예외를 주도적으로 처리&#x27;하는 단계로의 이동.</p>\n<h2>2. Key Takeaways</h2>\n<ul>\n<li><strong>포지셔닝 전환:</strong> 케이스 관리 = 단순 &#x27;업무 추적&#x27;이 아니라 <em>&#x27;예외가 일상인 복잡·동적 프로세스의 오케스트레이션&#x27;</em> (라구 말파니 CTPO).</li>\n<li><strong>성과 지표(도입사 기준):</strong></li>\n</ul>\n<p>  - 케이스 평균 처리 시간 <strong>60~80% 단축</strong></p>\n<p>  - 사람 개입 없이 해결되는 케이스 <strong>3~5배 증가</strong></p>\n<p>  - SLA 준수율 <strong>25%p 이상 향상</strong></p>\n<p>  - 금융서비스 초기 도입사 연간 예상 비용 절감 <strong>1,200만 달러(약 184억원)</strong></p>\n<ul>\n<li><strong>시장 신호:</strong> 응답자 <strong>52%</strong>가 사람+AI 혼합(하이브리드) 워크플로우 존재를 인정 → 완전 자동화가 아니라 <em>human-in-the-loop</em>가 현실.</li>\n<li>통합 대상: 사람 · AI 에이전트 · 시스템 · 비즈니스 프로세스를 하나로 연결.</li>\n</ul>\n<h2>3. 💡 사업 아이디어 (한화 적용 관점)</h2>\n<ul>\n<li><strong>한화생명·손보 보험금/언더라이팅 케이스:</strong> 예외 많고 사람 판단 필요한 영역(분쟁 청구, 고액 심사)이 마에스트로 케이스의 타깃과 정확히 일치. 처리시간 60~80%↓ 효과를 보험 클레임에 적용 시 손해사정 비용·CS 부하 큰 절감 여지.</li>\n<li><strong>한화증권/자산운용 백오피스:</strong> KYC·AML·정정거래 등 예외 처리형 업무에 에이전틱 케이스 도입 → SLA·컴플라이언스 준수율 개선 (규제업 특성상 human-in-the-loop가 오히려 강점).</li>\n<li><strong>핵심 인사이트(재무 관점):</strong> 도입 ROI를 &quot;FTE 절감&quot;이 아니라 <strong>&quot;SLA 준수율↑ → 규제 리스크/페널티↓ + CS 이탈↓&quot;</strong>로 잡으면 금융 계열사 설득 논리가 달라짐.</li>\n<li><strong>신사업 씨앗:</strong> 금융 특화 &#x27;에이전틱 케이스&#x27; 솔루션을 한화 계열에 먼저 적용 → 검증 후 외부 금융사 대상 B2B SaaS로 확장 (AI금융·웰스테크 인접 영역).</li>\n</ul>\n<h2>4. 추가 리서치 / 사례</h2>\n<ul>\n<li><strong>[외부]</strong> UiPath는 전통 RPA 1위였으나, 생성형 AI 등장 후 &#x27;agentic automation&#x27;으로 리포지셔닝 중. 마에스트로는 이 전략의 오케스트레이션 레이어. 경쟁: Microsoft(Copilot/Power Automate), Automation Anywhere, ServiceNow.</li>\n<li><strong>[외부]</strong> &#x27;케이스 관리(case management)&#x27;는 BPM의 한 갈래로, 보험·헬스케어·공공 민원처럼 <em>비정형·장기·예외 다발</em> 업무에 쓰이는 개념. 에이전트와 궁합이 좋은 이유.</li>\n</ul>\n<h2>5. Q&amp;A / 메모</h2>\n<p><strong>Q:</strong> SLA가 뭐야? (SLA 준수율 25%p 향상의 의미)</p>\n<p><strong>A:</strong> SLA = Service Level Agreement(서비스 수준 협약). &quot;이 업무를 <em>언제까지/어느 수준으로</em> 처리하겠다&quot;는 목표 기준. 예) 보험금 청구는 48시간 내 처리, 고객 문의는 24시간 내 1차 응답.</p>\n<ul>\n<li><strong>SLA 준수율</strong> = (기한 내 처리한 케이스 ÷ 전체 케이스) × 100. 예) 100건 중 70건을 기한 내 끝내면 준수율 70%.</li>\n<li><strong>왜 중요(특히 금융):</strong> SLA 미준수 → 계약 페널티 / 규제 위반 / 고객 이탈로 직결. 그래서 도입 ROI를 &#x27;인건비 절감&#x27;이 아니라 <em>&#x27;SLA 준수율↑ → 규제 리스크·페널티↓&#x27;</em>로 잡는 게 금융 계열사 설득에 강함 (§3 참고).</li>\n</ul>\n<hr>\n<p>_다시 볼 것 / 미해결:_</p>\n<ul>\n<li>마에스트로 케이스 vs 기존 UiPath &#x27;Maestro(오케스트레이션)&#x27; 제품과의 구체적 차이 — 후속 확인 필요.</li>\n</ul>", "search": "유아이패스 '마에스트로 케이스' — 에이전틱 케이스 관리 ai·llm #사업개발 #에이전트 #금융 #자동화 # 유아이패스 '마에스트로 케이스' — 에이전틱 케이스 관리\n\n## 1. 핵심 요약\n유아이패스(uipath)가 ai 네이티브로 설계한 에이전틱 케이스 관리 기능 **'마에스트로 케이스(maestro case)'**를 발표(2026-06-23). 기존 정형 rpa로는 처리하기 어려운 **동적이고 예외가 많은 업무**를, ai 에이전트가 사람·시스템과 함께 하나의 워크플로우로 오케스트레이션해 처리하는 것이 핵심. rpa에서 → '에이전트가 예외를 주도적으로 처리'하는 단계로의 이동.\n\n## 2. key takeaways\n- **포지셔닝 전환:** 케이스 관리 = 단순 '업무 추적'이 아니라 *'예외가 일상인 복잡·동적 프로세스의 오케스트레이션'* (라구 말파니 ctpo).\n- **성과 지표(도입사 기준):**\n  - 케이스 평균 처리 시간 **60~80% 단축**\n  - 사람 개입 없이 해결되는 케이스 **3~5배 증가**\n  - sla 준수율 **25%p 이상 향상**\n  - 금융서비스 초기 도입사 연간 예상 비용 절감 **1,200만 달러(약 184억원)**\n- **시장 신호:** 응답자 **52%**가 사람+ai 혼합(하이브리드) 워크플로우 존재를 인정 → 완전 자동화가 아니라 *human-in-the-loop*가 현실.\n- 통합 대상: 사람 · ai 에이전트 · 시스템 · 비즈니스 프로세스를 하나로 연결.\n\n## 3. 💡 사업 아이디어 (한화 적용 관점)\n- **한화생명·손보 보험금/언더라이팅 케이스:** 예외 많고 사람 판단 필요한 영역(분쟁 청구, 고액 심사)이 마에스트로 케이스의 타깃과 정확히 일치. 처리시간 60~80%↓ 효과를 보험 클레임에 적용 시 손해사정 비용·cs 부하 큰 절감 여지.\n- **한화증권/자산운용 백오피스:** kyc·aml·정정거래 등 예외 처리형 업무에 에이전틱 케이스 도입 → sla·컴플라이언스 준수율 개선 (규제업 특성상 human-in-the-loop가 오히려 강점).\n- **핵심 인사이트(재무 관점):** 도입 roi를 \"fte 절감\"이 아니라 **\"sla 준수율↑ → 규제 리스크/페널티↓ + cs 이탈↓\"**로 잡으면 금융 계열사 설득 논리가 달라짐.\n- **신사업 씨앗:** 금융 특화 '에이전틱 케이스' 솔루션을 한화 계열에 먼저 적용 → 검증 후 외부 금융사 대상 b2b saas로 확장 (ai금융·웰스테크 인접 영역).\n\n## 4. 추가 리서치 / 사례\n- **[외부]** uipath는 전통 rpa 1위였으나, 생성형 ai 등장 후 'agentic automation'으로 리포지셔닝 중. 마에스트로는 이 전략의 오케스트레이션 레이어. 경쟁: microsoft(copilot/power automate), automation anywhere, servicenow.\n- **[외부]** '케이스 관리(case management)'는 bpm의 한 갈래로, 보험·헬스케어·공공 민원처럼 *비정형·장기·예외 다발* 업무에 쓰이는 개념. 에이전트와 궁합이 좋은 이유.\n\n## 5. q&a / 메모\n**q:** sla가 뭐야? (sla 준수율 25%p 향상의 의미)\n**a:** sla = service level agreement(서비스 수준 협약). \"이 업무를 *언제까지/어느 수준으로* 처리하겠다\"는 목표 기준. 예) 보험금 청구는 48시간 내 처리, 고객 문의는 24시간 내 1차 응답.\n- **sla 준수율** = (기한 내 처리한 케이스 ÷ 전체 케이스) × 100. 예) 100건 중 70건을 기한 내 끝내면 준수율 70%.\n- **왜 중요(특히 금융):** sla 미준수 → 계약 페널티 / 규제 위반 / 고객 이탈로 직결. 그래서 도입 roi를 '인건비 절감'이 아니라 *'sla 준수율↑ → 규제 리스크·페널티↓'*로 잡는 게 금융 계열사 설득에 강함 (§3 참고).\n\n---\n_다시 볼 것 / 미해결:_\n- 마에스트로 케이스 vs 기존 uipath 'maestro(오케스트레이션)' 제품과의 구체적 차이 — 후속 확인 필요.\n"}, {"file": "_TEMPLATE.md", "title": "📄 (예시) <책/자료 제목>", "date": "<YYYY-MM-DD>", "category": "✦ 예시/템플릿", "source": "<밀리의 서재 / 저자·출판사 / URL>", "type": "<book | paper | article | video | docs>", "tags": ["<#재무>", "<#세무>", "<#글로벌사업>", "<#사업개발>"], "html": "<h1>&lt;제목&gt;</h1>\n<h2>1. 핵심 요약</h2>\n<p 칼시 = 예측시장 양대 플레이어(벤치마킹 대상).</li>\n</ul>\n<h2>3. 💡 사업 아이디어 (한화 적용 관점)</h2>\n<ul>\n<li><strong>증권·자산운용 인접 신사업:</strong> 예측시장은 본질적으로 <em>파생·베팅형 금융상품</em>. 한화증권 입장에선 &#x27;이벤트 기반 파생&#x27;·정보집계 시장으로 해석 가능 → 단, <strong>국내는 도박 규제</strong>가 핵심 장벽(메타도 &#x27;게임 포인트&#x27;로 우회 시도하는 이유).</li>\n<li><strong>레져·게임화 교집합:</strong> 한화 리조트/갤러리아 멤버십에 &#x27;포인트 기반 예측 게임&#x27;을 붙이면 engagement·체류 강화 — 단 중독성·규제 리스크 관리 필수.</li>\n<li><strong>정보 가치(재무·리서치 관점):</strong> 예측시장 가격 = 군중의 확률 추정치. 사내 의사결정(수요예측·리스크)에 <em>내부 예측시장(internal prediction market)</em> 도입 → 사업개발 의사결정 품질 향상 도구로 활용 가능.</li>\n<li><strong>글로벌 관점:</strong> 미국은 칼시가 CFTC 규제 하 합법화 진행 → 규제 정비된 시장(미국)에서 한화 금융계열의 진출/제휴 기회 모니터링 가치.</li>\n</ul>\n<h2>4. 추가 리서치 / 사례</h2>\n<ul>\n<li><strong>[외부]</strong> <strong>예측시장</strong>: 미래 사건(선거·경제지표·스포츠 등)의 결과에 &#x27;예/아니오&#x27; 계약을 사고팔아, 그 가격이 곧 사건 발생 <em>확률</em>이 되는 시장. <strong>폴리마켓</strong>(크립토 기반)·<strong>칼시(Kalshi)</strong>(미 CFTC 규제 하 합법 거래소)가 대표.</li>\n<li><strong>[외부]</strong> 한국에선 예측시장 대부분이 <em>사행산업/도박</em>으로 분류돼 엄격 규제 → 메타·해외사들이 &#x27;points/무료&#x27; 모델로 우회하는 배경.</li>\n</ul>\n<h2>5. Q&amp;A / 메모</h2>\n<p><strong>Q:</strong> (아직 없음)</p>\n<p><strong>A:</strong></p>\n<hr>\n<p>_다시 볼 것 / 미해결:_</p>\n<ul>\n<li>칼시 CFTC 합법화 구조 / 한국 사행산업통합감독위원회 규제 경계선 — 진출 가능성 검토 시 확인.</li>\n</ul>", "search": "메타 '아레나(arena)' — 저커버그의 비밀 예측시장 앱 금융·자산운용 #사업개발 #글로벌사업 #증권 #예측시장 # 메타 '아레나(arena)' — 저커버그의 비밀 예측시장 앱\n\n## 1. 핵심 요약\n마크 저커버그(메타 ceo)가 **예측시장(prediction market)** 기반 독립형 모바일 앱 **'아레나(arena)'**를 비밀리에 개발 중(2026-06-24 보도). 폴리마켓·칼시를 모델로, **게임 포인트 기반** 시스템 검토. 기존 sns 플랫폼의 성장 한계를 넘으려는 신규 소셜 서비스 발굴 전략. 아직 초기 단계, 정식 출시 미확정.\n\n## 2. key takeaways\n- **예측시장 폭발적 성장:**\n  - 2025년 폴리마켓+칼시 거래규모 **500억 달러**\n  - 2026년 현재 **1,300억 달러+**\n  - 2030년 예상 **연 1조 달러** → 불과 몇 년 새 20배 전망.\n- **메타의 노림수:** sns 성장 정체 → '예측+소셜+게임화'로 신규 engagement·수익원 발굴. 게임 포인트로 규제(도박) 회피 시도.\n- **규제·윤리 리스크:** 블루멘탈 상원의원 — *\"과거 인스타그램에 슬롯머신 유사 요소로 청소년을 중독시켰다\"* → 중독성·도박성 논란 예상.\n- 폴리마켓·칼시 = 예측시장 양대 플레이어(벤치마킹 대상).\n\n## 3. 💡 사업 아이디어 (한화 적용 관점)\n- **증권·자산운용 인접 신사업:** 예측시장은 본질적으로 *파생·베팅형 금융상품*. 한화증권 입장에선 '이벤트 기반 파생'·정보집계 시장으로 해석 가능 → 단, **국내는 도박 규제**가 핵심 장벽(메타도 '게임 포인트'로 우회 시도하는 이유).\n- **레져·게임화 교집합:** 한화 리조트/갤러리아 멤버십에 '포인트 기반 예측 게임'을 붙이면 engagement·체류 강화 — 단 중독성·규제 리스크 관리 필수.\n- **정보 가치(재무·리서치 관점):** 예측시장 가격 = 군중의 확률 추정치. 사내 의사결정(수요예측·리스크)에 *내부 예측시장(internal prediction market)* 도입 → 사업개발 의사결정 품질 향상 도구로 활용 가능.\n- **글로벌 관점:** 미국은 칼시가 cftc 규제 하 합법화 진행 → 규제 정비된 시장(미국)에서 한화 금융계열의 진출/제휴 기회 모니터링 가치.\n\n## 4. 추가 리서치 / 사례\n- **[외부]** **예측시장**: 미래 사건(선거·경제지표·스포츠 등)의 결과에 '예/아니오' 계약을 사고팔아, 그 가격이 곧 사건 발생 *확률*이 되는 시장. **폴리마켓**(크립토 기반)·**칼시(kalshi)**(미 cftc 규제 하 합법 거래소)가 대표.\n- **[외부]** 한국에선 예측시장 대부분이 *사행산업/도박*으로 분류돼 엄격 규제 → 메타·해외사들이 'points/무료' 모델로 우회하는 배경.\n\n## 5. q&a / 메모\n**q:** (아직 없음)\n**a:**\n\n---\n_다시 볼 것 / 미해결:_\n- 칼시 cftc 합법화 구조 / 한국 사행산업통합감독위원회 규제 경계선 — 진출 가능성 검토 시 확인.\n"}, {"file": "yc-how-to-get-evaluate-startup-ideas.md", "title": "YC — 스타트업 아이디어 얻고 평가하는 법 (Jared Friedman)", "date": "2026-06-26", "category": "사업개발·창업", "source": "https://www.youtube.com/watch?v=Th8JoIan4dg", "type": "video", "tags": ["#사업개발", "#창업", "#YC", "#아이디어평가"], "html": "<h1>YC — 스타트업 아이디어 얻고 평가하는 법 (Jared Friedman, Startup School)</h1>\n<h2>1. 핵심 요약</h2>\n<p>YC 파트너 Jared Friedman의 강연. 좋은 아이디어를 <em>고르는 것</em>이 성공 확률을 높인다는 전제. <strong>해법이 아니라 문제와 사랑에 빠지고</strong>, 결국 <strong>창업자-시장 적합성</strong>이 가장 중요하다는 게 핵심. 근거: YC 시총 top 100 기업의 아이디어 출처 정량분석 + Paul Graham 에세이 &#x27;How to Get Startup Ideas&#x27; + 피벗 코칭 경험 + 탈락 지원서 수천 건 분석. 구성: ①흔한 실수 ②평가 10문항 ③생성 7레시피.</p>\n<h2>2. Key Takeaways</h2>\n<h3>① 가장 흔한 실수 4</h3>\n<ul>\n<li><strong>진짜 문제 미해결(SISP, solution in search of a problem):</strong> &quot;AI 멋진데 어디 쓰지?&quot;식 접근. → 문제에서 출발. 단 너무 추상적(세계빈곤)이면 안 되고 <em>구체적·해결가능</em>해야.</li>\n<li><strong>타르 구덩이(tar pit) 아이디어:</strong> 모두가 겪는 흔한 문제라 쉬워 보이나 <em>구조적 이유</em>로 아무도 못 푼 것(예: 친구 약속잡기 앱, 20년째 YC 지원). → 구글링 + 과거 도전자 인터뷰로 &#x27;어려운 지점&#x27; 파악.</li>\n<li><strong>첫 아이디어에 무작정 뛰어듦</strong> (사업성 검토 생략).</li>\n<li><strong>완벽한 아이디어 기다리다 시작 못 함.</strong> 정답은 중간. 아이디어 = 변형될 <em>출발점</em>.</li>\n</ul>\n<h3>② 아이디어 평가 — 10문항</h3>\n<p>1. <strong>창업자-시장 적합성(founder-market fit)</strong> — 가장 중요. <em>우리 팀</em>이 적임자인가. 아이디어 탐색을 &quot;우리 팀에 좋은 아이디어 찾기&quot;로 재정의. (PlanGrid)</p>\n<p>2. <strong>시장 크기</strong> — 지금 크거나 / 작지만 급성장(2012 Coinbase).</p>\n<p>3. <strong>문제의 절박함</strong> — 대안이 <em>문자 그대로 없음</em>이 최고(Brex 스타트업용 법인카드).</p>\n<p>4. <strong>경쟁자</strong> — 있는 게 정상. 강한 기존 경쟁엔 <em>새 통찰</em> 필요.</p>\n<p>5. <strong>본인/지인이 진짜 원하나.</strong></p>\n<p>6. <strong>최근에야 가능/필요?</strong> — 신기술·규제변화·새 문제가 기회 창출(Checker, 긱이코노미 배경조사 API).</p>\n<p>7. <strong>좋은 프록시(proxy)</strong> — 유사하나 직접 경쟁 아닌 대기업(Rappi ← DoorDash 중남미).</p>\n<p>8. <strong>수년간 할 만한가</strong> — 함정. 열정은 나중에 생김. 최고 아이디어는 지루한 영역에 많음.</p>\n<p>9. <strong>확장 가능성</strong> — 순수 SW=O / 서비스·에이전시(고숙련 인력 의존)=주의.</p>\n<p>10. <strong>좋은 아이디어 공간(idea space)</strong> — Dalton 개념. 영역별 적중률 천차만별: 핀테크 인프라·버티컬 SaaS↑ vs 소비자 하드웨어·소셜·애드테크↓. 비옥한 공간이면 초기 아이디어가 틀려도 인접 아이디어로 표류 가능(Fivetran).</p>\n<h3>③ &quot;나빠 보이지만 사실 좋은&quot; 3가지 (남들이 피해서 기회로 남음)</h3>\n<ul>\n<li><strong>시작이 어려운 것:</strong> Stripe(은행 딜·결제 인프라 학습이 다 겁먹게 함 = schlep blindness, PG 에세이).</li>\n<li><strong>지루한 영역:</strong> Gusto(급여 SW). 어차피 6~12개월 후 일상 업무는 동일 → 초기 &#x27;재미&#x27;는 실제 즐거움과 무상관.</li>\n<li><strong>경쟁자 있는 것:</strong> Dropbox(20번째였으나 <em>아무도 안 씀</em> → &quot;다들 UI가 구리다&quot; + OS 통합 자동동기화 통찰).</li>\n</ul>\n<h3>④ 아이디어 생성</h3>\n<ul>\n<li><strong>최선은 유기적 발견</strong> (top 100의 70%+). 장기 셋업: 가치있는 분야 전문가 되기(스타트업 취업) / 프로그래머는 흥미로운 것 만들기(Replit).</li>\n<li><strong>즉시 만드는 7레시피(좋은 순):</strong> (1) 팀이 잘하는 것 → 자동 founder-market fit(Rezi) (2) 직접 겪은 문제, 남보다 잘 보이는 위치(Vetcove) (3) 내가 원하는 것(DoorDash) ← 가장 위험, &quot;왜 아직 없지?&quot; 자문 (4) 최근 바뀐 것(Gather.town/코로나) + 최근 성공기업의 변형(Nuvocargo=중남미 Flexport) (5) 사람들에게 문제 묻기 — 비옥한 공간 먼저 고르고 고객+창업자 둘 다 인터뷰(AtoB, 트럭 휴게소 방문) (6) 망가진 거대 산업 (7) [보너스] 아이디어 있는 공동창업자 찾기.</li>\n<li><strong>마무리:</strong> 확신의 유일한 방법 = <strong>그냥 출시해서 확인</strong>.</li>\n</ul>\n<h2>3. 💡 사업 아이디어 (한화 적용 관점)</h2>\n<ul>\n<li><strong>10문항 = 한화 신사업 심사 체크리스트:</strong> 사내 신사업 제안을 이 10개 질문으로 스크리닝하면 &#x27;AI 멋지니까&#x27; 식 SISP 제안을 거를 수 있음.</li>\n<li><strong>&#x27;창업자-시장 적합성&#x27; → &#x27;계열사-시장 적합성&#x27;:</strong> 한화가 <em>기존 자산</em>(보험/증권/자산운용/에너지/방산/리조트)을 레버리지하는 신사업은 자동 적합성 확보. 무관한 영역 진출은 경계.</li>\n<li><strong>대기업의 역설적 강점 = &quot;시작이 어렵고/지루하고/규제 심한&quot; 영역:</strong> schlep(은행 딜·규제 대응·인프라)이 스타트업을 겁주는 곳이야말로 <em>자본·라이선스·관계</em>를 가진 한화가 이기는 자리. (앞서 본 [[meta-arena-prediction-market]]의 도박규제, [[uipath-maestro-case-agentic]]의 금융 컴플라이언스가 바로 그런 &#x27;진입장벽=해자&#x27; 사례.)</li>\n<li><strong>&#x27;최근에야 가능/필요&#x27; 렌즈:</strong> STO 제도화, 탄소시장 개설, LLM 등 <em>규제·기술 변화</em>가 한화 금융·에너지 계열의 신사업 창구.</li>\n<li><strong>&#x27;좋은 아이디어 공간&#x27; 선택:</strong> 코퍼레이트 벤처링도 적중률 높은 공간(핀테크 인프라·버티컬 SaaS)부터.</li>\n<li><strong>AtoB식 현장조사:</strong> 책상이 아니라 <em>현장(계열사 영업점·고객)</em>에 가서 고객+업계 창업자 인터뷰 → 진짜 문제 발굴.</li>\n</ul>\n<h2>4. 추가 리서치 / 사례</h2>\n<ul>\n<li><strong>[외부]</strong> 같이 읽으면 좋은 PG 에세이: &#x27;How to Get Startup Ideas&#x27;, &#x27;Schlep Blindness&#x27;.</li>\n<li><strong>[외부]</strong> Jared Friedman = YC 파트너(전 Scribd 공동창업). 본 강연은 YC Startup School 정규 커리큘럼 영상.</li>\n</ul>\n<h2>5. Q&amp;A / 메모</h2>\n<p><strong>Q:</strong> (아직 없음)</p>\n<p><strong>A:</strong></p>\n<hr>\n<p>_다시 볼 것 / 미해결:_</p>\n<ul>\n<li>10문항 체크리스트를 한화 신사업 검토용 1페이지 템플릿으로 만들어보기.</li>\n</ul>", "search": "yc — 스타트업 아이디어 얻고 평가하는 법 (jared friedman) 사업개발·창업 #사업개발 #창업 #yc #아이디어평가 # yc — 스타트업 아이디어 얻고 평가하는 법 (jared friedman, startup school)\n\n## 1. 핵심 요약\nyc 파트너 jared friedman의 강연. 좋은 아이디어를 *고르는 것*이 성공 확률을 높인다는 전제. **해법이 아니라 문제와 사랑에 빠지고**, 결국 **창업자-시장 적합성**이 가장 중요하다는 게 핵심. 근거: yc 시총 top 100 기업의 아이디어 출처 정량분석 + paul graham 에세이 'how to get startup ideas' + 피벗 코칭 경험 + 탈락 지원서 수천 건 분석. 구성: ①흔한 실수 ②평가 10문항 ③생성 7레시피.\n\n## 2. key takeaways\n\n### ① 가장 흔한 실수 4\n- **진짜 문제 미해결(sisp, solution in search of a problem):** \"ai 멋진데 어디 쓰지?\"식 접근. → 문제에서 출발. 단 너무 추상적(세계빈곤)이면 안 되고 *구체적·해결가능*해야.\n- **타르 구덩이(tar pit) 아이디어:** 모두가 겪는 흔한 문제라 쉬워 보이나 *구조적 이유*로 아무도 못 푼 것(예: 친구 약속잡기 앱, 20년째 yc 지원). → 구글링 + 과거 도전자 인터뷰로 '어려운 입장벽=해자' 사례.)\n- **'최근에야 가능/필요' 렌즈:** sto 제도화, 탄소시장 개설, llm 등 *규제·기술 변화*가 한화 금융·에너지 계열의 신사업 창구.\n- **'좋은 아이디어 공간' 선택:** 코퍼레이트 벤처링도 적중률 높은 공간(핀테크 인프라·버티컬 saas)부터.\n- **atob식 현장조사:** 책상이 아니라 *현장(계열사 영업점·고객)*에 가서 고객+업계 창업자 인터뷰 → 진짜 문제 발굴.\n\n## 4. 추가 리서치 / 사례\n- **[외부]** 같이 읽으면 좋은 pg 에세이: 'how to get startup ideas', 'schlep blindness'.\n- **[외부]** jared friedman = yc 파트너(전 scribd 공동창업). 본 강연은 yc startup school 정규 커리큘럼 영상.\n\n## 5. q&a / 메모\n**q:** (아직 없음)\n**a:**\n\n---\n_다시 볼 것 / 미해결:_\n- 10문항 체크리스트를 한화 신사업 검토용 1페이지 템플릿으로 만들어보기.\n"}];
const list = document.getElementById('list');
const content = document.getElementById('content');
const q = document.getElementById('q');
let active = null;

function tagsHtml(tags){ return tags.map(t=>`<span class="tag">${t}</span>`).join(''); }

function render(filter=''){
  const f = filter.trim().toLowerCase();
  const matches = NOTES.filter(n => !f || n.search.includes(f));
  list.innerHTML = '';
  if(!matches.length){ list.innerHTML = '<div class="empty">검색 결과 없음.</div>'; return; }
  const groups = {};
  matches.forEach(n=>{(groups[n.category]=groups[n.category]||[]).push(n);});
  Object.keys(groups).sort().forEach(cat=>{
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.innerHTML = `<span>${cat}</span><span class="n">${groups[cat].length}</span>`;
    list.appendChild(h);
    groups[cat].forEach(n=>{
      const div = document.createElement('div');
      div.className = 'note-item' + (active===n.file?' active':'');
      div.innerHTML = `<div class="t">${n.title}</div>
        <div class="m">${[n.date,n.type].filter(Boolean).join(' · ')}</div>
        <div>${tagsHtml(n.tags)}</div>`;
      div.onclick = ()=>openNote(n, f);
      list.appendChild(div);
    });
  });
}

function openNote(n, f){
  active = n.file;
  let body = n.html;
  if(f){
    const re = new RegExp('('+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    body = body.replace(/>([^<]+)</g, (m,txt)=> '>'+txt.replace(re,'<mark>$1</mark>')+'<');
  }
  content.innerHTML = `<article>
    <div class="meta-bar"><span class="cat">${n.category}</span>
      ${[n.date,n.type].filter(Boolean).map(x=>' · '+x).join('')}
      ${n.source?(' · '+ (/^https?:/.test(n.source)?`<a href="${n.source}" target="_blank">source</a>`:n.source)):''}
      <div>${tagsHtml(n.tags)}</div></div>
    ${body}</article>`;
  content.parentElement.scrollTop = 0;
  render(q.value);
}

q.addEventListener('input', ()=>render(q.value));
render();
if(NOTES.length) openNote(NOTES[0], '');
